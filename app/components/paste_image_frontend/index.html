<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        #paste-zone {
            border: 2px dashed #0078D4;
            border-radius: 8px;
            padding: 12px 16px;
            text-align: center;
            cursor: pointer;
            background: #f8faff;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: background 0.2s, border-color 0.2s;
            outline: none;
        }
        #paste-zone:focus, #paste-zone.active {
            border-color: #005a9e;
            background: #eef4ff;
            box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.2);
        }
        #paste-label { color: #555; font-size: 13px; }
        #paste-preview {
            display: none;
            max-width: 100%;
            max-height: 150px;
            margin-top: 8px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        .clear-btn {
            display: none;
            margin-top: 6px;
            padding: 4px 12px;
            font-size: 12px;
            background: #f44;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .clear-btn:hover { background: #d33; }
    </style>
</head>
<body>
    <div id="paste-zone" tabindex="0">
        <span id="paste-label">📋 Click here &amp; paste (Ctrl+V) a screenshot or image</span>
        <img id="paste-preview" />
        <button id="clear-btn" class="clear-btn">✕ Clear</button>
    </div>

    <script>
    // Wait for Streamlit component API to be injected
    function initComponent() {
        const zone = document.getElementById('paste-zone');
        const label = document.getElementById('paste-label');
        const preview = document.getElementById('paste-preview');
        const clearBtn = document.getElementById('clear-btn');

        function sendValue(value) {
            window.Streamlit.setComponentValue(value);
        }

        function handlePaste(e) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    e.preventDefault();
                    e.stopPropagation();
                    const blob = items[i].getAsFile();
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const dataUrl = event.target.result;
                        preview.src = dataUrl;
                        preview.style.display = 'block';
                        clearBtn.style.display = 'inline-block';
                        label.textContent = '\u2705 Image captured! Send your message to include it.';
                        sendValue(dataUrl);
                    };
                    reader.readAsDataURL(blob);
                    return;
                }
            }
        }

        function clearImage() {
            preview.src = '';
            preview.style.display = 'none';
            clearBtn.style.display = 'none';
            label.textContent = '\ud83d\udccb Click here & paste (Ctrl+V) a screenshot or image';
            sendValue(null);
        }

        zone.addEventListener('paste', handlePaste);
        document.addEventListener('paste', handlePaste);
        clearBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            clearImage();
        });

        function onRender(event) {
            window.Streamlit.setFrameHeight();
        }
        window.Streamlit.events.addEventListener(window.Streamlit.RENDER_EVENT, onRender);
        window.Streamlit.setComponentReady();
        window.Streamlit.setFrameHeight();
    }

    // Poll for Streamlit API availability
    function waitForStreamlit() {
        if (window.Streamlit) {
            initComponent();
        } else {
            setTimeout(waitForStreamlit, 50);
        }
    }
    waitForStreamlit();
    </script>
</body>
</html>
